<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | RRDCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --student: #d97706;
            --input-focus: #f59e0b;
            --font-color: #323232;
            --font-color-sub: #666;
            --bg-color: #fff;
            --main-color: #323232;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fcd34d 100%);
            padding: 2rem;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.9);
            border: 2px solid var(--main-color);
            border-radius: 8px;
            color: var(--main-color);
            font-weight: 600;
            text-decoration: none;
            box-shadow: 4px 4px 0 var(--main-color);
            transition: all 0.2s;
        }
        .back-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--main-color); }
        .back-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--main-color); }
        
        .wrapper {
            width: 100%;
            max-width: 400px;
        }
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand img {
            height: 70px;
            filter: drop-shadow(0 0 15px rgba(217,119,6,0.5));
        }
        .brand h2 {
            color: var(--student);
            font-size: 1.5rem;
            margin-top: 0.5rem;
        }
        
        .card {
            background: var(--bg-color);
            padding: 2.5rem;
            border-radius: 12px;
            border: 3px solid var(--student);
            box-shadow: 8px 8px 0 var(--student);
        }
        
        .role-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(217,119,6,0.1);
            border: 2px solid var(--student);
            border-radius: 20px;
            color: var(--student);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }
        
        .title {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--main-color);
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: var(--font-color-sub);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--font-color);
            margin-bottom: 0.5rem;
        }
        
        input {
            width: 100%;
            height: 48px;
            border-radius: 8px;
            border: 2px solid var(--main-color);
            background: var(--bg-color);
            box-shadow: 4px 4px var(--main-color);
            font-size: 15px;
            font-weight: 600;
            color: var(--font-color);
            padding: 0 12px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--student);
            box-shadow: 4px 4px var(--student);
        }
        input::placeholder { color: var(--font-color-sub); opacity: 0.6; }
        
        .btn-login {
            width: 100%;
            height: 48px;
            margin-top: 1rem;
            border-radius: 8px;
            border: 2px solid var(--student);
            background: var(--student);
            box-shadow: 4px 4px 0 rgba(217,119,6,0.3);
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-login:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(217,119,6,0.3);
        }
        .btn-login:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0;
        }
        
        .error {
            display: none;
            align-items: center;
            gap: 8px;
            background: #fee2e2;
            border: 2px solid #ef4444;
            box-shadow: 3px 3px 0 #ef4444;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #dc2626;
        }
        .error.show { display: flex; }
        
        .demo-creds {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(217,119,6,0.08);
            border: 2px dashed rgba(217,119,6,0.3);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .demo-creds strong {
            color: var(--student);
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .demo-creds code {
            background: rgba(217,119,6,0.15);
            color: var(--student);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: 600;
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        .links a {
            color: var(--font-color-sub);
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover { color: var(--student); }
    </style>
</head>
<body>
    <a href="login-select.html" class="back-btn">← Back</a>
    
    <div class="wrapper">
        <div class="brand">
            <img src="images/logo.png" alt="RRDCH">
            <h2>Student Portal</h2>
        </div>
        
        <div class="card">
            <span class="role-badge">Student Login</span>
            <h1 class="title">Student Access</h1>
            <p class="subtitle">Enter your Student ID and password to access academic resources</p>
            
            <div class="error" id="errorMsg">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Invalid Student ID or password
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="studentId">Student ID / Roll Number</label>
                    <input type="text" id="studentId" placeholder="e.g., STU2024001" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn-login">Login as Student</button>
            </form>
            
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Academic Office</a>
            </div>
            
            <div class="demo-creds">
                <strong>Demo Credentials</strong><br>
                Student ID: <code>stu2024001</code> | Password: <code>Student@2024</code>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('studentId').value;
            const pass = document.getElementById('password').value;
            
            if (id === 'stu2024001' && pass === 'Student@2024') {
                sessionStorage.setItem('rrdch_role', 'student');
                sessionStorage.setItem('rrdch_user', id);
                window.location.href = 'students.html';
            } else {
                document.getElementById('errorMsg').classList.add('show');
                setTimeout(() => document.getElementById('errorMsg').classList.remove('show'), 5000);
            }
        });
    </script>
</body>
</html>
