<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracking | RRDCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    
    <style>
        :root {
            --bg: #f8fafc; --text: #1e293b; --muted: #64748b;
            --border: #e2e8f0; --blue: #1c4578; --green: #16a34a; --amber: #d97706; --red: #dc2626;
            --sidebar-bg: #ffffff;
            --font: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); color: var(--text); overflow: hidden; display: flex; height: 100vh; background: var(--bg); }
        
        .sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .header { padding: 1.5rem; border-bottom: 1px solid var(--border); background: var(--blue); color: white; }
        .header h2 { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.2); padding: 0.4rem 0.75rem; border-radius: 99px; font-size: 0.8rem; font-weight: 600; margin-top: 1rem; }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
        
        .route-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .stop-item { display: flex; gap: 1rem; position: relative; padding-bottom: 1.5rem; }
        .stop-item:last-child { padding-bottom: 0; }
        .stop-line { position: absolute; left: 7px; top: 20px; bottom: 0; width: 2px; background: var(--border); }
        .stop-item:last-child .stop-line { display: none; }
        .stop-dot { width: 16px; height: 16px; border-radius: 50%; border: 3px solid var(--blue); background: white; position: relative; z-index: 2; margin-top: 3px; }
        .stop-dot.active { background: var(--blue); border-color: #bfdbfe; box-shadow: 0 0 0 4px #bfdbfe; }
        .stop-dot.passed { background: var(--green); border-color: var(--green); }
        
        .stop-info { flex: 1; }
        .stop-name { font-weight: 600; font-size: 0.95rem; }
        .stop-eta { font-size: 0.8rem; color: var(--muted); font-weight: 500; margin-top: 0.2rem; }
        .stop-eta.highlight { color: var(--amber); font-weight: 700; }
        
        .main { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        .back-btn { position: absolute; top: 1rem; right: 1rem; z-index: 1000; background: white; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; text-decoration: none; color: var(--text); border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 0.5rem; }
        .back-btn:hover { background: var(--bg); }
        
        /* Guard Controls */
        .guard-panel { padding: 1rem; background: #f1f5f9; border-top: 1px solid var(--border); }
        .guard-panel h3 { font-size: 0.9rem; margin-bottom: 0.75rem; color: var(--blue); }
        .form-group { margin-bottom: 0.75rem; }
        .form-input { width: 100%; padding: 0.4rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; }
        .btn { width: 100%; padding: 0.5rem; background: var(--blue); color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
        .btn:hover { background: #153a66; }
        
        /* Registration Overlay */
        .reg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .reg-card { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <header class="header">
            <h2><i data-lucide="bus"></i> Bus Tracker</h2>
            <div class="status-badge">
                <div class="pulse-dot" id="liveDot"></div>
                <span id="busStatus">Waiting for GPS...</span>
            </div>
        </header>
        
        <div class="route-list" id="routeList">
            <!-- Stops injected here -->
        </div>
        
        <!-- Guard Controls (Only visible if role is security or admin) -->
        <div class="guard-panel" id="guardPanel" style="display: none;">
            <h3><i data-lucide="shield"></i> Driver / Guard Controls</h3>
            <div class="form-group">
                <select id="guardStop" class="form-input"></select>
            </div>
            <div class="form-group">
                <select id="guardStatus" class="form-input">
                    <option value="On Route">On Route</option>
                    <option value="At Stop">At Stop</option>
                    <option value="Delayed">Delayed</option>
                </select>
            </div>
            <button class="btn" onclick="updateBusPosition()"><i data-lucide="map-pin"></i> Update Position</button>
            
            <hr style="margin: 1rem 0; border:0; border-top:1px solid #cbd5e1;">
            <button class="btn" style="background:var(--amber);" id="simBtn" onclick="toggleSimulation()"><i data-lucide="play"></i> Start Simulation</button>
        </div>
    </aside>

    <!-- Map Area -->
    <main class="main">
        <a href="javascript:history.back()" class="back-btn"><i data-lucide="arrow-left"></i> Back to Portal</a>
        <div id="map"></div>
    </main>

    <!-- Registration Wall -->
    <div class="reg-overlay" id="regOverlay">
        <div class="reg-card">
            <i data-lucide="shield-alert" style="width:48px;height:48px;color:var(--amber);margin-bottom:1rem;"></i>
            <h2 style="margin-bottom:0.5rem;">Access Restricted</h2>
            <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;">Bus tracking is only available to registered transport users. Please register with the transport office.</p>
            <button class="btn" style="width:100%;" onclick="mockRegister()"><i data-lucide="check-circle"></i> Request Access (Demo)</button>
        </div>
    </div>

<script>
    lucide.createIcons();
    const sb = window.sb;
    
    // Auth Check
    const role = sessionStorage.getItem('rrdch_role');
    if (!role) window.location.href = 'portal.html';
    
    if (role === 'security' || role === 'admin') {
        document.getElementById('guardPanel').style.display = 'block';
    } else {
        // Registration Check (Mock)
        if (!localStorage.getItem('rrdch_transport_registered')) {
            document.getElementById('regOverlay').style.display = 'flex';
        }
    }
    
    function mockRegister() {
        localStorage.setItem('rrdch_transport_registered', 'true');
        document.getElementById('regOverlay').style.display = 'none';
    }

    // Map Init
    const map = L.map('map').setView([12.9716, 77.5946], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
    
    const busIcon = L.divIcon({
        html: `<div style="background:var(--blue);width:36px;height:36px;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;color:white;box-shadow:0 0 15px rgba(28,69,120,0.6);"><i data-lucide="bus" style="width:20px;height:20px;"></i></div>`,
        className: '', iconSize: [36, 36], iconAnchor: [18, 18]
    });
    
    const stopIcon = L.divIcon({
        html: `<div style="background:white;width:12px;height:12px;border-radius:50%;border:3px solid var(--blue);"></div>`,
        className: '', iconSize: [12, 12], iconAnchor: [6, 6]
    });
    
    let busMarker;
    let routePolyline;
    let stopsData = [];
    let currentBusPos = null;

    // Load Data
    async function loadRoute() {
        // Fallback static data if DB empty
        stopsData = [
            {"name":"Hebbal","lat":13.0352,"lng":77.5970,"order":1},
            {"name":"Majestic","lat":12.9780,"lng":77.5708,"order":2},
            {"name":"Girinagar","lat":12.9206,"lng":77.5355,"order":3},
            {"name":"RRDCH Campus","lat":12.9082,"lng":77.5026,"order":4}
        ];
        
        if (sb) {
            const { data } = await sb.from('bus_routes').select('stops').limit(1).single();
            if (data && data.stops) {
                stopsData = data.stops.sort((a,b) => a.order - b.order);
            }
        }
        
        // Draw route
        const latlngs = stopsData.map(s => [s.lat, s.lng]);
        routePolyline = L.polyline(latlngs, {color: 'var(--blue)', weight: 4, opacity: 0.7}).addTo(map);
        map.fitBounds(routePolyline.getBounds(), {padding: [50, 50]});
        
        // Draw stops
        stopsData.forEach(s => L.marker([s.lat, s.lng], {icon: stopIcon}).addTo(map).bindPopup(s.name));
        
        // Populate Guard Dropdown
        const guardDrop = document.getElementById('guardStop');
        if (guardDrop) {
            guardDrop.innerHTML = stopsData.map((s, i) => `<option value="${i}">${s.name}</option>`).join('');
        }
        
        renderSidebar();
        loadBusPosition();
    }
    
    function renderSidebar() {
        const list = document.getElementById('routeList');
        list.innerHTML = stopsData.map((s, i) => `
            <div class="stop-item" id="stopItem-${i}">
                <div class="stop-line"></div>
                <div class="stop-dot" id="stopDot-${i}"></div>
                <div class="stop-info">
                    <div class="stop-name">${s.name}</div>
                    <div class="stop-eta" id="stopEta-${i}">Calculating...</div>
                </div>
            </div>
        `).join('');
    }
    
    const getMock = (key, defaultVal) => JSON.parse(localStorage.getItem(key)) || defaultVal;
    const setMock = (key, val) => { localStorage.setItem(key, JSON.stringify(val)); window.dispatchEvent(new Event('storage')); };

    async function loadBusPosition() {
        if (sb) {
            try {
                const { data } = await sb.from('bus_position').select('*').limit(1).single();
                if (data) {
                    currentBusPos = data;
                    updateMapAndSidebar(data.current_lat, data.current_lng, data.status, data.current_stop_index || 0);
                }
            } catch(e) {}
            
            try {
                // Subscribe
                sb.channel('bus-live')
                  .on('postgres_changes', { event: '*', schema: 'public', table: 'bus_position' }, (payload) => {
                      currentBusPos = payload.new;
                      updateMapAndSidebar(payload.new.current_lat, payload.new.current_lng, payload.new.status, payload.new.current_stop_index);
                  }).subscribe();
            } catch(e) {}
        }
        
        if (!currentBusPos) {
            // Seed initial from Mock
            currentBusPos = getMock('mock_bus_pos', { current_lat: stopsData[0].lat, current_lng: stopsData[0].lng, status: 'On Route', current_stop_index: 0 });
            updateMapAndSidebar(currentBusPos.current_lat, currentBusPos.current_lng, currentBusPos.status, currentBusPos.current_stop_index);
            
            if (!sb) {
                window.addEventListener('storage', (e) => {
                    if (e.key === 'mock_bus_pos' && e.newValue) {
                        const pos = JSON.parse(e.newValue);
                        currentBusPos = pos;
                        updateMapAndSidebar(pos.current_lat, pos.current_lng, pos.status, pos.current_stop_index);
                    }
                });
            }
        }
    }
    
    function updateMapAndSidebar(lat, lng, status, stopIndex) {
        if (!busMarker) {
            busMarker = L.marker([lat, lng], {icon: busIcon, zIndexOffset: 1000}).addTo(map);
        } else {
            busMarker.setLatLng([lat, lng]);
        }
        
        document.getElementById('busStatus').textContent = status;
        const dot = document.getElementById('liveDot');
        if (status === 'Delayed') dot.style.background = 'var(--red)';
        else if (status === 'At Stop') dot.style.background = 'var(--amber)';
        else dot.style.background = 'var(--green)';
        
        updateETAs(lat, lng, stopIndex);
    }
    
    // Distance in km
    function haversineKm(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    function updateETAs(currentLat, currentLng, nextStopIndex) {
        stopsData.forEach((stop, idx) => {
            const dot = document.getElementById(`stopDot-${idx}`);
            const eta = document.getElementById(`stopEta-${idx}`);
            
            if (idx < nextStopIndex) {
                dot.className = 'stop-dot passed';
                eta.textContent = 'Bus departed';
                eta.className = 'stop-eta';
            } else if (idx === nextStopIndex) {
                dot.className = 'stop-dot active';
                const dist = haversineKm(currentLat, currentLng, stop.lat, stop.lng);
                const mins = Math.ceil((dist / 40) * 60); // Assuming 40km/h
                if (mins <= 1) {
                    eta.textContent = 'Arriving now';
                    eta.className = 'stop-eta highlight';
                } else {
                    eta.textContent = `ETA: ~${mins} mins (${dist.toFixed(1)} km)`;
                    eta.className = 'stop-eta highlight';
                }
            } else {
                dot.className = 'stop-dot';
                // Estimate from next stop
                let cumulativeDist = haversineKm(currentLat, currentLng, stopsData[nextStopIndex].lat, stopsData[nextStopIndex].lng);
                for(let i=nextStopIndex; i<idx; i++) {
                    cumulativeDist += haversineKm(stopsData[i].lat, stopsData[i].lng, stopsData[i+1].lat, stopsData[i+1].lng);
                }
                const mins = Math.ceil((cumulativeDist / 40) * 60);
                eta.textContent = `ETA: ~${mins} mins`;
                eta.className = 'stop-eta';
            }
        });
    }
    
    // --- Guard Actions ---
    async function updateBusPosition() {
        const idx = parseInt(document.getElementById('guardStop').value);
        const status = document.getElementById('guardStatus').value;
        const stop = stopsData[idx];
        
        const posData = {
            id: currentBusPos?.id || 'BUS-01',
            current_lat: stop.lat,
            current_lng: stop.lng,
            status: status,
            current_stop_index: idx
        };
        
        if (sb) {
            try { await sb.from('bus_position').upsert(posData); return; } catch(e) {}
        }
        
        setMock('mock_bus_pos', posData);
        updateMapAndSidebar(posData.current_lat, posData.current_lng, posData.status, posData.current_stop_index);
    }
    
    // --- Simulation ---
    let simInterval = null;
    let simProgress = 0;
    let simSegment = 0;
    
    function toggleSimulation() {
        const btn = document.getElementById('simBtn');
        if (simInterval) {
            clearInterval(simInterval);
            simInterval = null;
            btn.innerHTML = '<i data-lucide="play"></i> Start Simulation';
            btn.style.background = 'var(--amber)';
        } else {
            simProgress = 0;
            simSegment = 0;
            btn.innerHTML = '<i data-lucide="square"></i> Stop Simulation';
            btn.style.background = 'var(--red)';
            
            simInterval = setInterval(() => {
                if (simSegment >= stopsData.length - 1) {
                    clearInterval(simInterval);
                    toggleSimulation();
                    return;
                }
                
                const start = stopsData[simSegment];
                const end = stopsData[simSegment+1];
                
                simProgress += 0.05; // 5% per tick
                let newPos;
                if (simProgress >= 1) {
                    simProgress = 0;
                    simSegment++;
                    newPos = { id: 'BUS-01', current_stop_index: simSegment, current_lat: end.lat, current_lng: end.lng, status: 'At Stop' };
                } else {
                    const lat = start.lat + (end.lat - start.lat) * simProgress;
                    const lng = start.lng + (end.lng - start.lng) * simProgress;
                    newPos = { id: 'BUS-01', current_stop_index: simSegment + 1, current_lat: lat, current_lng: lng, status: 'On Route' };
                }
                
                if (sb) { try { sb.from('bus_position').upsert(newPos).then(); } catch(e) {} }
                setMock('mock_bus_pos', newPos);
                if (!sb) updateMapAndSidebar(newPos.current_lat, newPos.current_lng, newPos.status, newPos.current_stop_index);
            }, 3000); // Update every 3 seconds
        }
        lucide.createIcons();
    }

    window.onload = () => {
        loadRoute();
        setTimeout(() => lucide.createIcons(), 500);
    };
    
    window.addEventListener('beforeunload', () => {
        if (sb) sb.removeAllChannels();
    });
</script>
</body>
</html>
